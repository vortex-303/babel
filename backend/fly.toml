# fly.toml app configuration file generated for babel-holy-cherry-8289 on 2026-04-21T13:12:35-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'babel-holy-cherry-8289'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8765
  force_https = true
  # Keep at least one machine always running. The worker streams chunk
  # uploads over tens of minutes to hours — an auto-stop mid-run yields a
  # 502 on the worker side and fails the whole translation. At 1 GB RAM
  # shared-cpu-1x this still fits comfortably in the Fly free tier.
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
